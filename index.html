        const { useState, useEffect, useRef } = React;

            const [loadingPercentage, setLoadingPercentage] = useState(0);

            const [isDiaryOpen, setIsDiaryOpen] = useState(false);
            const [tempMeditation, setTempMeditation] = useState("");
            const [tempRelease, setTempRelease] = useState("");
            const [affirmationChecked, setAffirmationChecked] = useState(false);

            // 六個課程秘境庫狀態 (默認選中第 1 課)

                    setLoadingPercentage(prev => {
                        if (prev >= 100) {
                            clearInterval(interval);
                            return 100;
                        }
                        return prev + 5;
                    });
                }, stepTime);

                const timeout = setTimeout(() => {
                    setIsLoading(false);
                }, 2100);

                return () => {
                    clearInterval(interval);
                    clearTimeout(timeout);
                };
            }, []);

            // 打字機計時 (95ms 一字)

                if (isLoading) return;
                let currentIndex = 0;
                setTypedText("");

                const typeInterval = setInterval(() => {
                    setTypedText(prev => prev + sloganText.charAt(currentIndex));
                    currentIndex++;
                    if (currentIndex >= sloganText.length) {
                        clearInterval(typeInterval);
                    }

                6: {
                    date: "能量校準 | 第六天",
                    title: "Day 6 | 檀香 Sandalwood",
                    theme: "定錨 Grounding",
                    scent: "檀香 1滴 + 歐洲冷杉 2滴 (神識定錨)",
                    affirmation: "我深植大地，擁有無比的沉靜力量",
                    description: "在能量校準突破前，我們做最深沉的釋放。絲柏與冷杉能沖洗靈魂的塵土，檀香能徹底平息過度思考的腦部噪音。",
                    practice: "專注於脊椎尾端。想像妳的能量化作古老森林的樹根深深紮入地心，接收來自地母溫慢、厚實的承接與滋養。",

                },
                7: {
                    date: "能量校準 | 第七天",
                    title: "Day 7 | 玫瑰 & 沒藥 Rose & Myrrh",

            const toggleNatureSound = () => {
                if (isPlayingAudio) {
                    if (audioCtxRef.current) {
                        audioCtxRef.current.close();
                        audioCtxRef.current = null;
                    }
                    setIsPlayingAudio(false);
                    showToast("🕯️ 靜謐音流已關閉。回到耳根清淨...");
                } else {
                    try {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        const ctx = new AudioContext();
                        audioCtxRef.current = ctx;

                        // 模擬深海低頻海浪 (Noise Buffer)
                        const bufferSize = 3 * ctx.sampleRate;
                        const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const output = noiseBuffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            output[i] = Math.random() * 2 - 1;
                        }

                        const noiseNode = ctx.createBufferSource();
                        noiseNode.buffer = noiseBuffer;
                        noiseNode.loop = true;

                        const lowpass = ctx.createBiquadFilter();
                        lowpass.type = 'lowpass';
                        lowpass.frequency.setValueAtTime(200, ctx.currentTime);

                        const noiseGain = ctx.createGain();
                        noiseGain.gain.setValueAtTime(0.006, ctx.currentTime);

                        noiseNode.connect(lowpass);
                        lowpass.connect(noiseGain);
                        noiseGain.connect(ctx.destination);
                        noiseNode.start();

                        const oceanBreath = () => {
                            if (!audioCtxRef.current) return;
                            const now = ctx.currentTime;
                            noiseGain.gain.linearRampToValueAtTime(0.035, now + 4);
                            lowpass.frequency.linearRampToValueAtTime(320, now + 4);
                            noiseGain.gain.linearRampToValueAtTime(0.006, now + 9);
                            lowpass.frequency.linearRampToValueAtTime(140, now + 9);
                        };
                        oceanBreath();
                        const oceanInterval = setInterval(() => {
                            if (audioCtxRef.current) oceanBreath();
                            else clearInterval(oceanInterval);
                        }, 10000);

                        // 432Hz 頌缽頻率
                        const osc1 = ctx.createOscillator();
                        const osc2 = ctx.createOscillator();
                        const bowlGain = ctx.createGain();

                        osc1.type = 'sine';
                        osc1.frequency.setValueAtTime(108, ctx.currentTime);
                        osc2.type = 'triangle';
                        osc2.frequency.setValueAtTime(162, ctx.currentTime);

                        bowlGain.gain.setValueAtTime(0.012, ctx.currentTime);

                        osc1.connect(bowlGain);
                        osc2.connect(bowlGain);
                        bowlGain.connect(ctx.destination);

                        osc1.start();
                        osc2.start();

                        setIsPlayingAudio(true);
                        showToast("🌿 頂級私享 432Hz 音療已開啟，請在靜謐中校準能量...");

                                                <div class="flex items-center gap-3">
                                                    <span class="text-xs text-luxury-gold font-sans tracking-[0.25em] uppercase">CURRICULUM CHAPTER</span>
                                                    <span class={`text-[9px] tracking-widest px-3 py-0.5 uppercase ${isUnlocked ? 'bg-luxury-gold/10 text-luxury-gold' : 'bg-white/5 text-white/40'}`}>

                                                <p class="text-luxury-sage/80 leading-relaxed text-base body-editorial-lg">{curCourse.desc}</p>
                                                
                                                {isUnlocked ? (
                                                    <div class="bg-luxury-forest border border-luxury-gold/15 p-6 space-y-3">
                                                        <p class="text-xs text-luxury-gold tracking-[0.2em] font-sans uppercase">💡 Karen 導師試閱私房心法 :</p>
                                                        <p class="text-sm text-luxury-sage leading-relaxed">{curCourse.unlockedContent}</p>
                                                    </div>
                                                ) : (
                                                    <div class="bg-luxury-forest/50 border border-dashed border-luxury-gold/20 p-6 flex flex-col sm:flex-row justify-between items-center gap-6">
                                                        <div>
                                                            <p class="text-xs text-luxury-gold tracking-[0.2em] font-sans uppercase">🔒 本堂課預計於流年交接期解鎖</p>

                                                        </div>
                                                        <button 
                                                            onClick={() => triggerNotifyModal(curCourse.title)}

                                                        >
                                                            加入等待解鎖名單
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })()}
                            </div>

                        </div>
                    </section>

                    {}
                    {/* 預約與變現諮詢系統 */}
                    <section id="booking" class="py-32 max-w-6xl mx-auto px-8 relative">
                        <div class="bg-luxury-forest border border-luxury-gold/20 overflow-hidden shadow-2xl grid md:grid-cols-12 gap-8 items-stretch">
                            
                            <div class="md:col-span-5 bg-luxury-obsidian p-10 md:p-14 flex flex-col justify-between space-y-10 relative border-r border-luxury-gold/10">
                                <div class="space-y-6">
                                    <span class="text-xs tracking-[0.35em] uppercase text-luxury-gold font-sans block">Aroma & Numerology Session</span>
                                    <h3 class="text-handwritten text-4.5xl text-white leading-tight">與 Karen 開啟<br />專屬妳的能量定錨</h3>
                                    <p class="text-luxury-sage text-sm font-light leading-relaxed">
                                        結合西元生命數字（1-9號靈魂密碼）與精油植物人格。找出妳此時身心內耗的突破口，並調配出專屬妳此刻流年的「身心定錨香氣瓶」（實體郵寄）。
                                    </p>
                                </div>

                                <div class="space-y-4 text-xs text-luxury-sage tracking-[0.05em] leading-relaxed font-sans">
                                    <div class="flex items-center gap-4">
                                        <i class="fa-regular fa-clock text-luxury-gold text-sm"></i>
                                        <span>深度個案 90 分鐘 (包含靈數與調香)</span>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <i class="fa-solid fa-map-location-dot text-luxury-gold text-sm"></i>
                                        <span>線上 Google Meet 隱密會議室</span>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <i class="fa-solid fa-box-tissue text-luxury-gold text-sm"></i>
                                        <span>諮詢後客製香氣瓶免運寄送到家</span>
                                    </div>
                                </div>
                            </div>

                            <div class="md:col-span-7 p-10 md:p-14">
                                <form onSubmit={(e) => { e.preventDefault(); showToast("✨ 預約請求已送出！Karen 會在 24 小時內與妳聯繫安排時間。"); }} class="space-y-8">
                                    <h4 class="text-handwritten text-3xl text-white tracking-luxury">🔮 預約我的專屬療癒席次</h4>
                                    
                                    <div class="space-y-4">
                                        <label class="text-[10px] tracking-[0.25em] text-luxury-gold font-sans uppercase block">1. 選擇期望時段</label>
                                        <div class="grid grid-cols-2 gap-4">
                                            {["午後放空 (14:00 - 15:30)", "睡前定錨 (20:00 - 21:30)"].map((time) => (
                                                <button
                                                    type="button"
                                                    key={time}
                                                    class="py-4 px-2 border border-luxury-gold/15 hover:border-luxury-gold bg-luxury-obsidian text-[11px] tracking-wider text-luxury-cream text-center transition rounded-none"
                                                >
                                                    {time}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div class="space-y-4">
                                        <label class="text-[10px] tracking-[0.25em] text-luxury-gold font-sans uppercase block">2. 填寫妳的資訊</label>
                                        <input 
                                            required
                                            type="text" 
                                            placeholder="妳的名字或稱呼" 
                                            class="w-full bg-luxury-obsidian/50 border border-luxury-gold/15 focus:border-luxury-gold px-4 py-3 text-sm text-luxury-cream placeholder-luxury-sage/30 outline-none transition-all rounded-none"
                                        />
                                        <input 
                                            required
                                            type="email" 
                                            placeholder="電子信箱" 
                                            class="w-full bg-luxury-obsidian/50 border border-luxury-gold/15 focus:border-luxury-gold px-4 py-3 text-sm text-luxury-cream placeholder-luxury-sage/30 outline-none transition-all rounded-none"
                                        />
                                        <textarea 
                                            placeholder="聊聊妳最近的身心內耗問題、或是想透過生命數字與芳療改善什麼..." 
                                            rows="3"
                                            class="w-full bg-luxury-obsidian/50 border border-luxury-gold/15 focus:border-luxury-gold px-4 py-3 text-sm text-luxury-cream placeholder-luxury-sage/30 outline-none transition-all resize-none rounded-none"
                                        ></textarea>
                                    </div>

                                    <button 
                                        type="submit" 
                                        class="w-full bg-luxury-gold text-luxury-obsidian hover:bg-luxury-cream py-4 text-xs tracking-[0.25em] uppercase font-semibold transition-all duration-300"
                                    >
                                        預約 90 分鐘深度療癒個案席次 (NT$ 3,600)
                                    </button>
                                </form>
                            </div>

                        </div>
                    </section>

                    {/* 頁尾 */}
                    <footer class="bg-luxury-obsidian py-24 border-t border-luxury-gold/10 text-center relative z-10">
                        <div class="max-w-4xl mx-auto px-8 space-y-10">
                            <h2 class="text-handwritten text-4.5xl text-luxury-gold italic">
                                there is no secret recipe.
                            </h2>
                            
                            <p class="text-luxury-sage font-light max-w-md mx-auto text-sm leading-relaxed tracking-wider">
                                世界很吵，這裡永遠有一片安全的草地。<br />
                                歡迎妳隨時回來躺著，找回呼吸的節奏。
                            </p>

                            <div class="flex justify-center gap-8 text-xs tracking-[0.2em] text-luxury-sage/50 font-sans uppercase">
                                <span>hello@karenhealing.com</span>
                                <span>|</span>
                                <span>© 2026 by Karen. All Rights Reserved.</span>
                            </div>
                        </div>
                    </footer>

                    {/* 右下角精品低頻呼吸合成器 */}
                    <div class="fixed bottom-8 right-8 z-50">
                        <button 
                            onClick={toggleNatureSound}
                            class={`w-14 h-14 rounded-full flex items-center justify-center border transition-all duration-500 shadow-2xl ${
                                isPlayingAudio 
                                ? 'bg-luxury-gold border-luxury-gold text-luxury-obsidian animate-pulse' 
                                : 'bg-luxury-obsidian border-luxury-gold/30 text-luxury-gold hover:border-luxury-gold'
                            }`}
                            title="開啟 432Hz 呼吸音療定錨聲"
                        >
                            {isPlayingAudio ? (
                                <i class="fa-solid fa-volume-high text-lg"></i>
                            ) : (
                                <i class="fa-solid fa-volume-xmark text-lg"></i>
                            )}
                        </button>
                        {!isPlayingAudio && (
                            <span class="absolute -top-1 -right-1 flex h-3 w-3">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-luxury-gold opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-3 w-3 bg-luxury-gold"></span>
                            </span>
                        )}
                    </div>

                    {/* 精緻 Toast 提示 */}
                    {activeToast && (
                        <div class="fixed top-8 left-1/2 -translate-x-1/2 z-[9999] bg-luxury-forest border border-luxury-gold text-luxury-cream py-4 px-8 rounded-none shadow-2xl max-w-md w-full text-center text-xs tracking-wider uppercase animate-bounce">
                            {activeToast}
                        </div>
                    )}

                    {/* 解鎖通知 Modal */}
                    {isNotifyModalOpen && (
                        <div class="fixed inset-0 bg-luxury-obsidian/95 z-[999] flex items-center justify-center p-6 backdrop-blur-md">
                            <div class="bg-luxury-forest border border-luxury-gold/30 max-w-md w-full rounded-none p-8 md:p-10 relative space-y-6">
                                <button 
                                    onClick={() => setIsNotifyModalOpen(false)}
                                    class="absolute top-6 right-6 text-luxury-sage hover:text-white text-2xl"
                                >
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                                
                                <div class="space-y-2">
                                    <span class="text-xs text-luxury-gold font-sans tracking-[0.3em] uppercase block">WAITING LIST SIGNUP</span>
                                    <h3 class="text-handwritten text-3xl text-white">課堂能量預熱・加入等待名單</h3>
                                </div>
                                
                                <p class="text-luxury-sage text-sm leading-relaxed">
                                    您即將加入 **{notifyTarget}** 的解鎖通知名單。Karen 將在課程正式開啟或更新的第一時間，將課堂調香講義與限時試聽連結發送至您的信箱。
                                </p>

                                <form onSubmit={handleSubscribe} class="space-y-4">
                                    <input 
                                        required
                                        type="email" 
                                        value={emailInput}
                                        onChange={(e) => setEmailInput(e.target.value)}
                                        placeholder="輸入妳的電子信箱 (E-mail)" 
                                        class="w-full bg-luxury-obsidian/80 border border-luxury-gold/20 focus:border-luxury-gold px-4 py-3 text-sm text-luxury-cream placeholder-luxury-sage/40 outline-none transition-all rounded-none"
                                    />
                                    <button 
                                        type="submit"
                                        class="w-full bg-luxury-gold text-luxury-obsidian py-4 text-xs tracking-[0.25em] uppercase font-bold transition hover:bg-luxury-cream"
                                    >
                                        尊貴訂閱解鎖通知
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {}
                    {/* 高級溫潤紙質「線上打卡手冊」Modal */}
                    {isDiaryOpen && (
                        <div class="fixed inset-0 bg-luxury-obsidian/85 z-[9999] flex items-center justify-center p-4 md:p-6 backdrop-blur-md overflow-y-auto">
                            <div class="bg-[#fdfcf9] text-[#2c2a29] border border-luxury-gold max-w-lg w-full rounded-none p-8 md:p-10 relative space-y-8 shadow-2xl transition-all max-h-[90vh] overflow-y-auto">
                                <button 
                                    onClick={() => setIsDiaryOpen(false)}
                                    class="absolute top-6 right-6 text-luxury-clay hover:text-luxury-obsidian text-2xl transition"
                                >
                                    <i class="fa-solid fa-xmark"></i>
                                </button>

                                {/* 手帳頁首標記 */}
                                <div class="border-b-2 border-luxury-gold/20 pb-4">
                                    <span class="text-[10px] text-luxury-gold font-sans tracking-[0.3em] uppercase block mb-1">Aroma Calibration Diary</span>
                                    <h3 class="text-handwritten text-4xl text-luxury-obsidian font-bold">21天能量打卡手冊</h3>
                                    <p class="text-xs text-luxury-clay font-sans uppercase tracking-widest mt-1">Day {selectedDay} 冥想篇章</p>
                                </div>

                                <form onSubmit={saveDiaryAndCheckIn} class="space-y-6">
                                    
                                    {/* 1. 今日香氣處方 */}
                                    <div class="space-y-2">
                                        <div class="flex items-center gap-2">
                                            <span class="text-xs font-bold uppercase tracking-wider text-luxury-obsidian">今日香氣處方</span>
                                            <span class="text-[9px] bg-luxury-gold/15 text-luxury-clay px-2 py-0.5 rounded font-sans">Daily Prescription</span>
                                        </div>
                                        <div class="bg-luxury-cream border border-luxury-gold/15 p-4 space-y-1">
                                            <p class="text-sm font-semibold text-luxury-obsidian flex items-center gap-2">
                                                <i class="fa-solid fa-leaf text-luxury-gold text-xs"></i>
                                                香氣配方：{dailyProgram[selectedDay].scent.split(" (")[0]}
                                            </p>
                                            <p class="text-xs text-luxury-clay">
                                                關鍵能量：<span class="text-luxury-obsidian font-bold">{dailyProgram[selectedDay].theme}</span>
                                            </p>
                                        </div>
                                    </div>

                                    {/* 2. 正能量肯定句 */}
                                    <div class="space-y-3">
                                        <div class="flex items-center gap-2">
                                            <span class="text-xs font-bold uppercase tracking-wider text-luxury-obsidian">正能量肯定句</span>
                                            <span class="text-[9px] bg-luxury-gold/15 text-luxury-clay px-2 py-0.5 rounded font-sans">Affirmation</span>
                                        </div>
                                        <div class="bg-luxury-gold/5 border border-dashed border-luxury-gold/30 p-4 relative overflow-hidden">
                                            <p class="text-handwritten text-2xl text-luxury-obsidian text-center italic my-2">
                                                「{dailyProgram[selectedDay].affirmation}」
                                            </p>
                                            <p class="text-[10px] text-center text-luxury-clay leading-relaxed">
                                                {dailyProgram[selectedDay].description}
                                            </p>
                                        </div>
                                        
                                        {/* 肯定句誦讀承諾勾選 */}
                                        <label class="flex items-center gap-3 cursor-pointer p-2 hover:bg-luxury-cream transition">
                                            <input 
                                                type="checkbox" 
                                                checked={affirmationChecked}
                                                onChange={(e) => setAffirmationChecked(e.target.checked)}
                                                class="accent-luxury-gold h-4 w-4 cursor-pointer"
                                            />
                                            <span class="text-xs text-luxury-obsidian font-medium">
                                                我已將手敷於心輪，並複誦今日的肯定句。
                                            </span>
                                        </label>
                                    </div>

                                    {/* 3. 今日淨化冥想心得 */}
                                    <div class="space-y-2">
                                        <div class="flex items-center gap-2">
                                            <span class="text-xs font-bold uppercase tracking-wider text-luxury-obsidian">今日淨化冥想心得 (15分鐘)</span>
                                        </div>
                                        <textarea 
                                            required
                                            value={tempMeditation}
                                            onChange={(e) => setTempMeditation(e.target.value)}
                                            placeholder="今天閉眼冥想時，妳身體與情緒最深刻的感受是什麼..." 
                                            rows="3"
                                            class="w-full bg-luxury-cream border border-luxury-gold/20 focus:border-luxury-gold px-4 py-3 text-sm text-luxury-obsidian placeholder-luxury-clay/40 outline-none transition-all resize-none rounded-none"
                                        ></textarea>
                                    </div>

                                    {/* 4. 今天我願意釋放的是 */}
                                    <div class="space-y-2">
                                        <div class="flex items-center gap-2">
                                            <span class="text-xs font-bold uppercase tracking-wider text-luxury-obsidian">今天我願意釋放的是...</span>
                                        </div>
                                        <textarea 
                                            required
                                            value={tempRelease}
                                            onChange={(e) => setTempRelease(e.target.value)}
                                            placeholder="溫柔地放下面前那些不再服務妳、重壓在肩上的內耗與重擔..." 
                                            rows="3"
                                            class="w-full bg-luxury-cream border border-luxury-gold/20 focus:border-luxury-gold px-4 py-3 text-sm text-[#2c2a29] placeholder-luxury-clay/40 outline-none transition-all resize-none rounded-none"
                                        ></textarea>
                                    </div>

                                    <div class="pt-4 border-t border-luxury-gold/15 flex gap-4">
                                        <button 
                                            type="button"
                                            onClick={() => setIsDiaryOpen(false)}
                                            class="w-1/3 border border-luxury-clay text-luxury-clay hover:bg-luxury-cream py-4 text-xs tracking-[0.25em] uppercase font-bold transition"
                                        >
                                            取消返回
                                        </button>
                                        <button 
                                            type="submit"
                                            class="w-2/3 bg-luxury-obsidian text-luxury-gold hover:bg-luxury-gold hover:text-luxury-obsidian py-4 text-xs tracking-[0.25em] uppercase font-bold transition duration-300 shadow-xl"
                                        >
                                            儲存並點亮冥想蠟燭
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // Render React
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>
</html>
